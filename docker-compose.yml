services:
  api:
    build:
      context: ..
      dockerfile: modelseed-api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - modelseed-jobs:/tmp/modelseed-jobs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  modelseed-jobs:
